repositories {
  flatDir {
    dirs 'libs'
  }
  //Anythink(Core)
  maven {
    url "https://jfrog.takuad.com/artifactory/china_sdk"
  }
  maven { url "https://jfrog.anythinktech.com/artifactory/debugger" }
  //Csj
  maven {
    url "https://artifact.bytedance.com/repository/pangle"
  }

}
dependencies {
  //Anythink (Necessary)
  api "com.anythink.sdk:core-taku:6.5.73.3"

  // Debugger UI（showDebuggerUI 真实拉起需要）
