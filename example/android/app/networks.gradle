  api "com.anythink.sdk:sdk-ads-meishu:2.5.13.0"
  api "com.squareup.okhttp3:okhttp:3.12.1"
  api "com.google.code.gson:gson:2.8.5"
  api "com.android.support:cardview-v7:21.0.0"

  //octopus
  api "com.anythink.sdk:adapter-taku-octopus:2.6.5.7.1.0"
  api "com.anythink.sdk:sdk-ads-octopus:2.6.5.7"

  //beizi
  api "com.anythink.sdk:adapter-taku-beizi:5.5.0.3.1.0"
