buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// AnyThink Core SDK 仓库（供 app implementation 与插件 compileOnly 解析；phase-1 接入）
allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "https://jfrog.takuad.com/artifactory/china_sdk" }
        maven { url "https://jfrog.anythinktech.com/artifactory/debugger" }
        flatDir { dirs "$rootDir/app/libs" }
    }
}
